<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" direction="rtl">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1a"/>
      <stop offset="60%" style="stop-color:#0d1b35"/>
      <stop offset="100%" style="stop-color:#060d1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="360" cy="190" rx="420" ry="380" fill="url(#glow1)"/>
  <ellipse cx="840" cy="440" rx="380" ry="340" fill="url(#glow2)"/>
  <!-- شعار ✨ -->
  <text x="600" y="200" text-anchor="middle" font-size="100" font-family="Arial" fill="white" opacity="0.9">✨</text>
  <!-- اسم المنصة -->
  <text x="600" y="310" text-anchor="middle" font-size="72" font-weight="900"
        font-family="Arial, sans-serif" fill="white">عفراء للتوظيف</text>
  <!-- وصف -->
  <text x="600" y="390" text-anchor="middle" font-size="34" font-weight="600"
        font-family="Arial, sans-serif" fill="#94a3b8">ناصع البياض في سوق العمل العراقي</text>
  <!-- شريط سفلي -->
  <rect x="0" y="560" width="1200" height="70" fill="#0d9488" opacity="0.18"/>
  <text x="600" y="605" text-anchor="middle" font-size="26" font-weight="700"
        font-family="Arial, sans-serif" fill="#14b8a6">afra-iq.com</text>
</svg>
