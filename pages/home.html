<!-- ═══════════════════════════════════════════════════════════
     الفانوس للتوظيف — home.js
     الدوال: pgSeekerHome(), pgAdminHome(), pgAdminJobs(), ...
═══════════════════════════════════════════════════════════ -->
<script>
// ── صفحة الرئيسية للباحث ──
function pgSeekerHome(el) {
  const nm       = P?.name?.split(' ')[0] || 'مستخدم';
  const newJ     = JOBS.filter(j => (Date.now() - new Date(j.postedAt)) < 86400000 * 3).length;
  const matchedJ = JOBS.filter(j => P?.province && j.province === P.province).length;
  const pct      = getCompletion(P, 'seeker');
  const pColor   = completionColor(pct);
  const stats    = {
    total:     MY_APPS.length,
    pending:   MY_APPS.filter(a => a.status === 'pending').length,
    interview: MY_APPS.filter(a => a.status === 'interview').length,
    hired:     MY_APPS.filter(a => a.status === 'hired').length,
  };
  const greet = new Date().getHours() < 12 ? 'صباح الخير' : new Date().getHours() < 18 ? 'مساء الخير' : 'مساء النور';

  el.innerHTML = `
    <!-- ══ البانر الترحيبي ══ -->
    <div class="hero-banner fade-up">
      <div class="hero-lamp">🪔</div>
      <div class="hero-content">
        <p class="hero-label">${greet}، مرحباً بك في الفانوس 👋</p>
        <h2 class="hero-name">أهلاً، ${nm}</h2>
        <p class="hero-sub">
          ${newJ ? `<strong>${newJ} وظيفة</strong> جُددت هذا الأسبوع` : 'تصفح الوظائف المتاحة'}
          ${matchedJ ? ` • <strong>${matchedJ}</strong> في محافظتك` : ''}
          ${BOOKMARKS.length ? ` • <strong>${BOOKMARKS.length}</strong> محفوظة <span id="bkmCount" style="display:none">${BOOKMARKS.length}</span>` : ''}
        </p>
        <div class="hero-actions">
          <button class="btn bp" onclick="goTo('jobs')"><i class="fas fa-search"></i>ابحث عن وظيفة</button>
          <button class="btn" style="border:1px solid rgba(255,255,255,.25);color:#fff;background:rgba(255,255,255,.08);gap:6px;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700;display:inline-flex;align-items:center"
            onclick="oMo('moIV');buildIVModal()"><i class="fas fa-robot"></i>تدرّب للمقابلة</button>
        </div>
      </div>
    </div>

    <!-- ══ اكتمال الملف الشخصي ══ -->
    ${pct < 90 ? `
    <div class="comp-card fade-up del1">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div class="comp-label"><i class="fas fa-user-check"></i>اكتمال ملفك الشخصي</div>
          <div class="comp-val" style="color:${pColor}">${pct}%</div>
          <div class="comp-hint">ملف مكتمل = فرص توظيف أفضل</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn bp bsm" onclick="goTo('profile')"><i class="fas fa-pencil-alt"></i>أكمل ملفي</button>
        </div>
      </div>
      <div class="comp-bar-wrap"><div class="comp-bar" style="--w:${pct}%;background:${pColor}"></div></div>
      <div class="comp-actions">
        ${!P?.phone    ? `<span class="comp-tip"><i class="fas fa-times-circle" style="color:var(--danger)"></i>رقم الهاتف</span>` : ''}
        ${!P?.jobTitle ? `<span class="comp-tip"><i class="fas fa-times-circle" style="color:var(--danger)"></i>المسمى الوظيفي</span>` : ''}
        ${!P?.bio      ? `<span class="comp-tip"><i class="fas fa-times-circle" style="color:var(--danger)"></i>نبذة شخصية</span>` : ''}
        ${P?.phone && P?.jobTitle && P?.bio ? `<span class="comp-tip"><i class="fas fa-check-circle" style="color:var(--success)"></i>الأساسيات مكتملة، تقدّم لوظيفة!</span>` : ''}
      </div>
    </div>` : `
    <div class="comp-card fade-up del1" style="border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:50%;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--success);flex-shrink:0"><i class="fas fa-check-circle"></i></div>
        <div>
          <div style="font-size:13px;font-weight:800;color:var(--tx)">ملفك الشخصي مكتمل ✅</div>
          <div style="font-size:11px;color:var(--tx2)">أنت في وضع ممتاز للحصول على وظيفة</div>
        </div>
        <div style="margin-right:auto"><span style="font-size:22px;font-weight:900;color:var(--success)">${pct}%</span></div>
      </div>
    </div>`}

    <!-- ══ الإحصائيات ══ -->
    <div class="sg fade-up del2">
      <div class="sc sc-link" onclick="goTo('jobs')">
        <div class="si tl"><i class="fas fa-briefcase"></i></div>
        <div>
          <div class="sl">وظائف متاحة</div>
          <div class="sv">${JOBS.length}</div>
          <div class="sc-trend up"><i class="fas fa-arrow-up"></i>${newJ} جديدة</div>
        </div>
      </div>
      <div class="sc sc-link" onclick="goTo('myapps')">
        <div class="si am"><i class="fas fa-paper-plane"></i></div>
        <div>
          <div class="sl">طلباتي</div>
          <div class="sv">${stats.total}</div>
          ${stats.pending ? `<div class="sc-trend neu"><i class="fas fa-hourglass-half"></i>${stats.pending} قيد المراجعة</div>` : `<div class="sc-trend neu">لا توجد طلبات</div>`}
        </div>
      </div>
      <div class="sc sc-link" onclick="goTo('myapps')">
        <div class="si pu"><i class="fas fa-comments"></i></div>
        <div>
          <div class="sl">مقابلات</div>
          <div class="sv">${stats.interview}</div>
          ${stats.interview ? `<div class="sc-trend up"><i class="fas fa-star"></i>أداء رائع!</div>` : `<div class="sc-trend neu">—</div>`}
        </div>
      </div>
      <div class="sc sc-link" onclick="goTo('myapps')">
        <div class="si gr"><i class="fas fa-check-circle"></i></div>
        <div>
          <div class="sl">تم القبول</div>
          <div class="sv">${stats.hired}</div>
          ${stats.hired ? `<div class="sc-trend up"><i class="fas fa-trophy"></i>مبروك!</div>` : `<div class="sc-trend neu">—</div>`}
        </div>
      </div>
    </div>

    <!-- ══ التخصصات ══ -->
    <div class="sh fade-up del3">
      <div class="st"><div class="st-ico"><i class="fas fa-th-large"></i></div>تصفح حسب التخصص</div>
      <button class="btn bg bsm" onclick="goTo('jobs')">الكل <i class="fas fa-arrow-left"></i></button>
    </div>
    <div class="cat-grid fade-up del3">
      ${[
        { v:'tech',  l:'تقنية',    ic:'fa-laptop-code',    c:'var(--info)' },
        { v:'biz',   l:'أعمال',    ic:'fa-chart-line',     c:'var(--acc)' },
        { v:'med',   l:'طب',       ic:'fa-stethoscope',    c:'var(--danger)' },
        { v:'edu',   l:'تعليم',    ic:'fa-graduation-cap', c:'var(--purple)' },
        { v:'eng',   l:'هندسة',    ic:'fa-cogs',           c:'var(--p)' },
        { v:'other', l:'أخرى',     ic:'fa-ellipsis-h',     c:'var(--tx2)' },
      ].map(c => {
        const cnt = JOBS.filter(j => j.cat === c.v).length;
        return `<div class="cat-item" onclick="JF={type:'',cat:'${c.v}',prov:'',q:''};JSORT='newest';goTo('jobs')">
          <div class="cat-ico" style="color:${c.c};background:${c.c}18"><i class="fas ${c.ic}"></i></div>
          <div class="cat-label">${c.l}</div>
          <div class="cat-count">${cnt} وظيفة</div>
        </div>`;
      }).join('')}
    </div>

    <!-- ══ إجراءات سريعة ══ -->
    <div class="sh fade-up del4">
      <div class="st"><div class="st-ico"><i class="fas fa-bolt"></i></div>أدوات المهنة</div>
    </div>
    <div class="qact-grid fade-up del4">
      <div class="qact-card" onclick="oMo('moCV');buildCVModal()">
        <div class="qact-ico" style="background:linear-gradient(135deg,var(--p),var(--pl))"><i class="fas fa-file-alt"></i></div>
        <div class="qact-tit">منشئ السيرة الذاتية</div>
        <div class="qact-sub">أنشئ سيرة ذاتية احترافية وحمّلها PDF</div>
        <i class="fas fa-arrow-left qact-arr"></i>
      </div>
      <div class="qact-card" onclick="oMo('moIV');buildIVModal()">
        <div class="qact-ico" style="background:linear-gradient(135deg,var(--purple),#a78bfa)"><i class="fas fa-robot"></i></div>
        <div class="qact-tit">المقابلة الذكية</div>
        <div class="qact-sub">تدرّب مع الذكاء الاصطناعي وقيّم أداءك</div>
        <i class="fas fa-arrow-left qact-arr"></i>
      </div>
    </div>

    <!-- ══ أحدث الوظائف ══ -->
    <div class="sh fade-up del5">
      <div class="st">
        <div class="st-ico" style="background:linear-gradient(135deg,#ef4444,#f87171)"><i class="fas fa-fire-alt"></i></div>
        أحدث الوظائف
      </div>
      <button class="btn bg bsm" onclick="goTo('jobs')">عرض الكل <i class="fas fa-arrow-left"></i></button>
    </div>
    <div class="jg fade-up del5">${JOBS.slice(0, 4).map(j => jCard(j)).join('')}</div>`;
}

// ── لوحة الأدمن ──
function pgAdminHome(el) {
  const totalUsers = 124, totalOffices = 8, totalApps = 56;
  el.innerHTML = `
    <div class="hero-banner fade-up" style="margin-bottom:20px">
      <div class="hero-lamp">🪔</div>
      <div class="hero-content">
        <p class="hero-label">لوحة التحكم</p>
        <h2 class="hero-name">مرحباً بك، مدير النظام 🛡️</h2>
        <p class="hero-sub">نظرة عامة على أداء المنصة</p>
      </div>
    </div>

    <div class="sg fade-up del1">
      <div class="sc"><div class="si tl"><i class="fas fa-users"></i></div><div>
        <div class="sl">المستخدمون</div><div class="sv">${totalUsers}</div>
        <div class="sc-trend up"><i class="fas fa-arrow-up"></i>+8 هذا الأسبوع</div>
      </div></div>
      <div class="sc"><div class="si am"><i class="fas fa-briefcase"></i></div><div>
        <div class="sl">الوظائف</div><div class="sv">${JOBS.length}</div>
        <div class="sc-trend up"><i class="fas fa-arrow-up"></i>${JOBS.filter(j=>(Date.now()-new Date(j.postedAt))<86400000*7).length} جديدة</div>
      </div></div>
      <div class="sc"><div class="si bl"><i class="fas fa-building"></i></div><div>
        <div class="sl">مكاتب التوظيف</div><div class="sv">${totalOffices}</div>
        <div class="sc-trend neu"><i class="fas fa-circle"></i>نشطة</div>
      </div></div>
      <div class="sc"><div class="si gr"><i class="fas fa-paper-plane"></i></div><div>
        <div class="sl">إجمالي الطلبات</div><div class="sv">${totalApps}</div>
        <div class="sc-trend up"><i class="fas fa-arrow-up"></i>+12 اليوم</div>
      </div></div>
    </div>

    <!-- إجراءات سريعة -->
    <div class="sh fade-up del2"><div class="st"><div class="st-ico"><i class="fas fa-bolt"></i></div>إدارة سريعة</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px" class="fade-up del2">
      ${[
        { ico:'fa-briefcase', l:'إدارة الوظائف',   c:'var(--p)',      a:"goTo('alljobs')" },
        { ico:'fa-building',  l:'مكاتب التوظيف',   c:'var(--purple)', a:"goTo('alloffices')" },
        { ico:'fa-users',     l:'المستخدمون',       c:'var(--acc)',    a:"goTo('allusers')" },
        { ico:'fa-cog',       l:'الإعدادات',        c:'var(--info)',   a:"goTo('settings')" },
      ].map(a => `<div class="cat-item" onclick="${a.a}">
        <div class="cat-ico" style="color:${a.c};background:${a.c}18"><i class="fas ${a.ico}"></i></div>
        <div class="cat-label">${a.l}</div>
      </div>`).join('')}
    </div>

    <div class="al al-i fade-up del3"><i class="fas fa-info-circle"></i>وصّل Firebase لعرض البيانات الحقيقية. الأرقام الحالية تجريبية.</div>

    <!-- أحدث الوظائف -->
    <div class="sh fade-up del3"><div class="st"><div class="st-ico"><i class="fas fa-briefcase"></i></div>أحدث الوظائف</div></div>
    <div class="jg fade-up del3">${JOBS.slice(0,3).map(j=>jCard(j)).join('')}</div>`;
}

function pgAdminJobs(el) {
  el.innerHTML = `
    <div class="sh">
      <div class="st"><div class="st-ico"><i class="fas fa-briefcase"></i></div>الوظائف</div>
      <span class="b b-tl">${JOBS.length} وظيفة</span>
    </div>
    <div class="jg">${JOBS.map(j => jCard(j)).join('')}</div>`;
}

function pgAdminOffices(el) {
  const offices = [
    { nm:'مكتب الأمل للتوظيف',    pv:'بغداد',  j:8, r:4.7, apps:24 },
    { nm:'مكتب الراشدي',           pv:'كربلاء', j:5, r:4.5, apps:18 },
    { nm:'مكتب الصحة المهنية',    pv:'البصرة', j:3, r:4.3, apps:9  },
    { nm:'مكتب التعليم المتقدم',  pv:'أربيل',  j:6, r:4.8, apps:21 },
  ];
  el.innerHTML = `
    <div class="sh"><div class="st"><div class="st-ico"><i class="fas fa-building"></i></div>مكاتب التوظيف</div>
      <span class="b b-tl">${offices.length} مكتب</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px">
      ${offices.map(o => `
        <div class="card cp" style="transition:transform .2s,box-shadow .2s" onmouseenter="this.style.transform='translateY(-3px)';this.style.boxShadow='var(--shxl)'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
          <div style="display:flex;align-items:center;gap:11px;margin-bottom:12px">
            <div class="av avm" style="background:var(--grad-p);color:#fff;font-size:16px">${o.nm.charAt(0)}</div>
            <div>
              <div style="font-size:13px;font-weight:800;color:var(--tx)">${o.nm}</div>
              <div style="font-size:11px;color:var(--tx2)"><i class="fas fa-map-marker-alt"></i> ${o.pv}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;text-align:center">
            <div style="background:var(--bgc2);border-radius:9px;padding:8px">
              <div style="font-size:16px;font-weight:900;color:var(--p)">${o.j}</div>
              <div style="font-size:9px;color:var(--tx3)">وظيفة</div>
            </div>
            <div style="background:var(--bgc2);border-radius:9px;padding:8px">
              <div style="font-size:16px;font-weight:900;color:var(--acc)">${o.apps}</div>
              <div style="font-size:9px;color:var(--tx3)">طلب</div>
            </div>
            <div style="background:var(--bgc2);border-radius:9px;padding:8px">
              <div style="font-size:16px;font-weight:900;color:var(--success)">⭐${o.r}</div>
              <div style="font-size:9px;color:var(--tx3)">تقييم</div>
            </div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn bp bsm" style="flex:1" onclick="notify('قريباً','عرض تفاصيل المكتب','info')"><i class="fas fa-eye"></i>عرض</button>
            <button class="btn bo bsm" onclick="notify('قريباً','تعليق المكتب','warning')"><i class="fas fa-pause"></i></button>
          </div>
        </div>`).join('')}
    </div>`;
}

function pgAdminUsers(el) {
  el.innerHTML = `
    <div class="sh"><div class="st"><div class="st-ico"><i class="fas fa-users"></i></div>المستخدمون</div></div>
    <div class="al al-i" style="margin-bottom:18px"><i class="fas fa-info-circle"></i>وصّل Firebase لعرض المستخدمين الفعليين.</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      ${[
        { l:'الباحثون عن عمل', v:98,  ic:'fa-user-tie',  c:'var(--p)' },
        { l:'مكاتب التوظيف',   v:8,   ic:'fa-building',  c:'var(--purple)' },
        { l:'المديرون',         v:3,   ic:'fa-shield-alt',c:'var(--acc)' },
      ].map(x => `<div class="card cp" style="text-align:center">
        <div class="si" style="width:44px;height:44px;border-radius:12px;background:${x.c}18;color:${x.c};margin:0 auto 10px;font-size:18px;display:flex;align-items:center;justify-content:center">
          <i class="fas ${x.ic}"></i>
        </div>
        <div style="font-size:24px;font-weight:900;color:var(--tx)">${x.v}</div>
        <div style="font-size:11px;color:var(--tx3)">${x.l}</div>
      </div>`).join('')}
    </div>`;
}

function pgAdminSettings(el) {
  el.innerHTML = `
    <div class="sh"><div class="st"><div class="st-ico"><i class="fas fa-cog"></i></div>إعدادات النظام</div></div>
    <div class="card" style="margin-bottom:14px">
      <div class="ch"><div class="cht"><i class="fas fa-bell" style="color:var(--acc)"></i> إعدادات الإشعارات</div></div>
      <div class="cp">
        <div class="fr">
          <div class="fg"><label class="fl">رمز بوت Telegram</label><input type="text" class="fc" value="${CFG.telegram.bot}" id="tgBot" placeholder="YOUR_BOT_TOKEN"></div>
          <div class="fg"><label class="fl">Chat ID تيلجرام</label><input type="text" class="fc" value="${CFG.telegram.chat}" id="tgChat" placeholder="YOUR_CHAT_ID"></div>
        </div>
        <div class="fr">
          <div class="fg"><label class="fl">EmailJS Public Key</label><input type="text" class="fc" value="${CFG.emailjs.pub}" id="ejPub"></div>
          <div class="fg"><label class="fl">EmailJS Service ID</label><input type="text" class="fc" value="${CFG.emailjs.svc}" id="ejSvc"></div>
        </div>
        <div class="fg"><label class="fl">إيميل المدير</label><input type="email" class="fc" value="${CFG.emailjs.admin}" id="ejAdmin" placeholder="admin@example.com"></div>
        <button class="btn bp" onclick="
          CFG.telegram.bot   = document.getElementById('tgBot').value;
          CFG.telegram.chat  = document.getElementById('tgChat').value;
          CFG.emailjs.pub    = document.getElementById('ejPub').value;
          CFG.emailjs.svc    = document.getElementById('ejSvc').value;
          CFG.emailjs.admin  = document.getElementById('ejAdmin').value;
          notify('تم الحفظ ✅','تم تحديث إعدادات الإشعارات','success')
        "><i class="fas fa-save"></i>حفظ الإعدادات</button>
      </div>
    </div>
    <div class="card cp">
      <div style="font-size:13px;font-weight:800;color:var(--tx);margin-bottom:12px"><i class="fas fa-info-circle" style="color:var(--info)"></i> معلومات النظام</div>
      <div class="info-row">
        <div class="info-item"><i class="fas fa-code-branch"></i>الإصدار: 2.0</div>
        <div class="info-item"><i class="fas fa-database"></i>Firebase Firestore</div>
        <div class="info-item"><i class="fas fa-shield-alt"></i>آمن ومحمي</div>
      </div>
    </div>`;
}
</script>
