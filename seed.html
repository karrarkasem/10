    async function createAccount(acc) {
      log(`⏳ إنشاء حساب: ${acc.email}`);
      let uid;
      try {
        const cred = await auth.createUserWithEmailAndPassword(acc.email, acc.pass);
        uid = cred.user.uid;
        log(`✅ حساب جديد: ${acc.email}`, 'ok');
      } catch (e) {
        if (e.code === 'auth/email-already-in-use') {
          const cred = await auth.signInWithEmailAndPassword(acc.email, acc.pass);
          uid = cred.user.uid;
          log(`⚠️ موجود مسبقاً: ${acc.email}`, 'warn');
        } else throw e;
      }
      await db.collection('users').doc(uid).set({ ...acc.data, uid, createdAt: TS() }, { merge: true });
      log(`✅ Firestore: ${acc.data.role} — ${acc.data.name}`, 'ok');
      await auth.signOut();
      return uid;
    }
