<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب الأدمن — الفانوس</title>
<style>
  body { font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; background: #0f172a; color: #fff; }
  .box { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 420px; width: 90%; text-align: center; }
  h2 { margin: 0 0 8px; font-size: 22px; }
  p { color: #94a3b8; margin: 0 0 28px; font-size: 14px; }
  button { background: #f59e0b; color: #000; border: none; padding: 14px 32px;
           border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .msg { margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 14px; display: none; }
  .msg.ok  { background: #064e3b; color: #6ee7b7; display: block; }
  .msg.err { background: #7f1d1d; color: #fca5a5; display: block; }
  .info { background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 10px;
          padding: 14px; margin-bottom: 24px; font-size: 13px; color: #93c5fd; text-align: right; }
  .info strong { color: #fff; display: block; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="box">
  <h2>⚙️ إعداد حساب الأدمن</h2>
  <p>يُنشأ هذا الحساب مرة واحدة فقط</p>

  <div class="info">
    <strong>بيانات الحساب الذي سيُنشأ:</strong>
    البريد: <b>admin@fanoos.iq</b><br>
    كلمة المرور: <b>Fanoos@Admin1</b><br>
    الدور: <b>مدير النظام (admin)</b>
  </div>

  <button id="btn" onclick="createAdmin()">إنشاء حساب الأدمن</button>
  <div class="msg" id="msg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
const ADMIN_EMAIL = 'admin@fanoos.iq';
const ADMIN_PASS  = 'Fanoos@Admin1';

async function createAdmin() {
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'جارٍ الإنشاء...';
  msg.className = 'msg';
  msg.textContent = '';

  try {
    // إنشاء المستخدم في Firebase Auth
    const cred = await window.auth.createUserWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
    await cred.user.updateProfile({ displayName: 'مدير النظام' });

    // حفظ الدور في Firestore
    await window.db.collection('users').doc(cred.user.uid).set({
      name      : 'مدير النظام',
      email     : ADMIN_EMAIL,
      role      : 'admin',
      phone     : '07700000000',
      province  : 'كربلاء',
      status    : 'active',
      createdAt : firebase.firestore.FieldValue.serverTimestamp(),
    });

    await window.auth.signOut();

    msg.className = 'msg ok';
    msg.innerHTML = `
      ✅ تم إنشاء حساب الأدمن بنجاح!<br><br>
      <strong>البريد:</strong> ${ADMIN_EMAIL}<br>
      <strong>كلمة المرور:</strong> ${ADMIN_PASS}<br><br>
      <em>يمكنك حذف هذا الملف الآن (setup-admin.html)</em>
    `;
    btn.textContent = 'تم ✓';
  } catch (err) {
    msg.className = 'msg err';
    if (err.code === 'auth/email-already-in-use') {
      msg.textContent = '⚠️ هذا الحساب موجود مسبقاً — يمكنك الدخول مباشرة بالبيانات أعلاه';
    } else {
      msg.textContent = '❌ خطأ: ' + err.message;
    }
    btn.disabled = false;
    btn.textContent = 'إنشاء حساب الأدمن';
  }
}
</script>
</body>
</html>
